<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/levels.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="wrap">
        <div class="home">
            <div class="header">
                <div class="logo">
                    <img src="assets/logo.png">
                </div>
            </div>
            <div class="layout">
                <div class="play">
                    <button><img src="assets/ui/play.png"><b>Играть</b></button>
                </div>
                <div class="settings">
                    <button><img src="assets/ui/settings.png"><b>Настройки</b></button>
                </div>
            </div>
        </div>
        <div class="sections">
            <div class="header">
                <div class="back">
                    <button><img src="assets/ui/home.png"></button>
                </div>
                <div class="title">
                    <h1>Уровни</h1>
                </div>
            </div>
            <div class="layout"></div>
        </div>
        <div class="levels">
            <div class="header">
                <div class="back">
                    <button><img src="assets/ui/back.png"></button>
                </div>
                <div class="title">
                    <h1>Уровни</h1>
                </div>
            </div>
            <div class="layout"></div>
            <div class="footer">
                <div class="before">
                    <button><img src="assets/ui/before.png"></button>
                </div>
                <div class="page">
                    <span></span>
                </div>
                <div class="next">
                    <button><img src="assets/ui/next.png"></button>
                </div>
            </div>
        </div>
        <div class="game">
            <div class="header">
                <div class="back">
                    <button><img src="assets/ui/back.png"></button>
                </div>
                <div class="title">
                    <h1></h1>
                </div>
            </div>
            <div class="canvas"></div>
        </div>
    </div>

    <script src="js/levels.js"></script>
    <script src="js/scenes.js"></script>
    <script src="js/home.js"></script>
    <script src="js/sections.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
